<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Class Outlook スケジュール</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: #334155;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans",
          "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        padding: 1rem 1.25rem 2.5rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 650;
        margin: 0 0 0.35rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.875rem;
        margin-bottom: 1.25rem;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 0.75rem;
        margin-bottom: 1.5rem;
        padding: 0.75rem 1rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .legend span {
        font-size: 0.8rem;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-weight: 600;
      }
      .month-block {
        margin-bottom: 2rem;
      }
      .month-block h2 {
        font-size: 1.05rem;
        margin: 0 0 0.65rem;
        padding-bottom: 0.35rem;
        border-bottom: 1px solid var(--border);
        color: #f8fafc;
      }
      .wrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
        min-width: 720px;
      }
      th,
      td {
        padding: 0.55rem 0.65rem;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid var(--border);
      }
      th {
        background: #0c1222;
        color: var(--muted);
        font-weight: 600;
        white-space: nowrap;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr[data-status] {
        border-left: 4px solid var(--status-accent, #64748b);
      }
      td.period {
        white-space: nowrap;
        color: #cbd5e1;
        font-variant-numeric: tabular-nums;
      }
      td.period small {
        display: block;
        color: var(--muted);
        font-size: 0.75rem;
      }
      td.name {
        max-width: 28rem;
      }
      a.oid-link {
        color: #7dd3fc;
        text-decoration: underline;
        text-underline-offset: 2px;
        font-variant-numeric: tabular-nums;
      }
      a.oid-link:hover {
        color: #bae6fd;
      }
      .badge {
        display: inline-block;
        padding: 0.15rem 0.45rem;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 650;
        white-space: nowrap;
        background: var(--badge-bg);
        color: var(--badge-fg);
      }
      .err {
        color: #fca5a5;
        padding: 1rem;
        background: #450a0a;
        border-radius: 8px;
      }
      /* Class Status → 色（必要に応じて data.csv の値に合わせて追加） */
      tr[data-status="cancelled"] {
        --status-accent: #64748b;
      }
      tr[data-status="cancelled"] .badge {
        --badge-bg: #334155;
        --badge-fg: #e2e8f0;
      }
      tr[data-status="delivered"] {
        --status-accent: #22c55e;
      }
      tr[data-status="delivered"] .badge {
        --badge-bg: #14532d;
        --badge-fg: #bbf7d0;
      }
      tr[data-status="scheduled"] {
        --status-accent: #3b82f6;
      }
      tr[data-status="scheduled"] .badge {
        --badge-bg: #1e3a8a;
        --badge-fg: #bfdbfe;
      }
      tr[data-status="guaranteed-to-run"] {
        --status-accent: #f59e0b;
      }
      tr[data-status="guaranteed-to-run"] .badge {
        --badge-bg: #78350f;
        --badge-fg: #fde68a;
      }
      tr[data-status="other"] {
        --status-accent: #a855f7;
      }
      tr[data-status="other"] .badge {
        --badge-bg: #581c87;
        --badge-fg: #e9d5ff;
      }
      .legend .chip[data-slug="cancelled"] {
        background: #334155;
        color: #e2e8f0;
      }
      .legend .chip[data-slug="delivered"] {
        background: #14532d;
        color: #bbf7d0;
      }
      .legend .chip[data-slug="scheduled"] {
        background: #1e3a8a;
        color: #bfdbfe;
      }
      .legend .chip[data-slug="guaranteed-to-run"] {
        background: #78350f;
        color: #fde68a;
      }
      .legend .chip[data-slug="other"] {
        background: #581c87;
        color: #e9d5ff;
      }
      .legend .chip,
      td .chip {
        cursor: pointer;
        border: 2px solid transparent;
        font: inherit;
      }
      button.chip {
        font: inherit;
        border: 2px solid transparent;
        margin: 0;
        appearance: none;
        -webkit-appearance: none;
      }
      .legend .chip:hover,
      td .chip:hover,
      button.chip:hover {
        filter: brightness(1.08);
      }
      .legend .chip.is-active,
      td .chip.is-active,
      button.chip.is-active {
        border-color: #f8fafc;
        box-shadow: 0 0 0 1px #0f172a;
      }
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 0.75rem;
        margin: -0.5rem 0 1.25rem;
        font-size: 0.875rem;
        color: var(--muted);
      }
      .filter-bar strong {
        color: #f8fafc;
      }
      .filter-bar .clear-btn {
        cursor: pointer;
        padding: 0.25rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #334155;
        color: #e2e8f0;
        font-size: 0.8rem;
      }
      .filter-bar .clear-btn:hover {
        background: #475569;
      }
      .empty-filter {
        padding: 1rem;
        color: var(--muted);
        text-align: center;
      }
      .month-nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.45rem 0.5rem;
        margin-bottom: 1.25rem;
        padding: 0.65rem 0.85rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      .month-nav .label {
        font-size: 0.8rem;
        color: var(--muted);
        margin-right: 0.15rem;
      }
      .month-nav button.nav-month {
        cursor: pointer;
        padding: 0.3rem 0.65rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #1e293b;
        color: var(--text);
        font-size: 0.8rem;
        font: inherit;
      }
      .month-nav button.nav-month:hover {
        filter: brightness(1.08);
      }
      .month-nav button.nav-month.is-active {
        border-color: #f8fafc;
        box-shadow: 0 0 0 1px #0f172a;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <h1>Class Outlook スケジュール</h1>
    <p class="sub">
      同じフォルダの <code>data.csv</code> を読み込みます。
      <strong>Class Status</strong>（凡例または表のバッジ）をクリックすると、そのステータスだけ表示します。
      GitHub Pages では <strong>Settings → Pages</strong> でソースを <code>/docs</code> にすると
      リポジトリのサイト直下（<code>/</code>）から公開されます。
      終了日が本日より前のクラスは表示しません。複数月に予定があるときは下のボタンで月を切り替えられます。
    </p>
    <nav id="month-nav" class="month-nav" hidden aria-label="表示月の切り替え"></nav>
    <div id="legend" class="legend" hidden></div>
    <p id="filter-bar" class="filter-bar" hidden></p>
    <div id="app">読み込み中…</div>
    <script>
      (function () {
        var CSV_URL = "data.csv";
        /** @type {{ data: Array, seenStatus: string[], filterLabel: string|null }} */
        var state = {
          data: [],
          seenStatus: [],
          filterLabel: null,
          /** @type {string|null} YYYY-MM で 1 ヶ月だけ表示。null はすべて */
          selectedMonthKey: null,
        };

        function parseCSVLine(line) {
          var out = [];
          var cur = "";
          var inQ = false;
          for (var i = 0; i < line.length; i++) {
            var c = line.charAt(i);
            if (inQ) {
              if (c === '"') {
                if (line.charAt(i + 1) === '"') {
                  cur += '"';
                  i++;
                } else {
                  inQ = false;
                }
              } else {
                cur += c;
              }
            } else {
              if (c === '"') {
                inQ = true;
              } else if (c === ",") {
                out.push(cur);
                cur = "";
              } else {
                cur += c;
              }
            }
          }
          out.push(cur);
          return out;
        }

        function parseCSV(text) {
          var lines = text.trim().split(/\r?\n/);
          return lines.map(parseCSVLine);
        }

        function headerIndex(header, name) {
          var i = header.indexOf(name);
          if (i === -1) {
            throw new Error("CSV に「" + name + "」列がありません。");
          }
          return i;
        }

        function statusSlug(status) {
          return String(status || "")
            .trim()
            .toLowerCase()
            .replace(/\s+/g, "-")
            .replace(/[^a-z0-9-]/g, "") || "other";
        }

        function knownStatusRowAttr(slug) {
          if (
            slug === "cancelled" ||
            slug === "delivered" ||
            slug === "scheduled" ||
            slug === "guaranteed-to-run"
          ) {
            return slug;
          }
          return "other";
        }

        function pad2(n) {
          return n < 10 ? "0" + n : String(n);
        }

        /** @returns {{y:number, mo:number, d:number}|null} */
        function parseYmdParts(s) {
          var str = String(s || "").trim();
          var m = str.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
          if (!m) {
            return null;
          }
          return {
            y: parseInt(m[1], 10),
            mo: parseInt(m[2], 10),
            d: parseInt(m[3], 10),
          };
        }

        function startOfToday() {
          var n = new Date();
          return new Date(n.getFullYear(), n.getMonth(), n.getDate());
        }

        /** @returns {Date|null} その日のローカル 0:00 */
        function parseYmdToLocalDate(s) {
          var p = parseYmdParts(s);
          if (!p) {
            return null;
          }
          return new Date(p.y, p.mo - 1, p.d);
        }

        function monthKeyFromParts(p) {
          if (!p) {
            return "";
          }
          return p.y + "-" + pad2(p.mo);
        }

        function monthKeyFromStart(startVal) {
          return monthKeyFromParts(parseYmdParts(startVal));
        }

        function monthKeyForItem(item) {
          return (
            monthKeyFromStart(item.start) ||
            monthKeyFromStart(item.end) ||
            ""
          );
        }

        /** クラス終了日（なければ開始日）が今日未満なら過去扱い */
        function isNotPastRow(item) {
          var endD = parseYmdToLocalDate(item.end);
          if (!endD) {
            endD = parseYmdToLocalDate(item.start);
          }
          if (!endD) {
            return true;
          }
          return endD >= startOfToday();
        }

        function monthLabel(key) {
          if (!key || key === "unknown") {
            return "日付不明";
          }
          var p = key.split("-");
          if (p.length < 2) {
            return key;
          }
          var y = parseInt(p[0], 10);
          var mo = parseInt(p[1], 10);
          if (!isFinite(y) || !isFinite(mo)) {
            return key;
          }
          return y + "年" + mo + "月";
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        /** Red Hat LMS で Offering ID をキーワード検索する URL */
        function lmsOfferingSearchUrl(oid) {
          var id = String(oid || "").trim();
          if (!id) {
            return "";
          }
          return (
            "https://training-lms.redhat.com/lmt/clmsBrowseV2.prMain?site=redhat&in_region=jp&in_lang=ja&in_keyword=" +
            encodeURIComponent(id)
          );
        }

        function offeringIdTdHtml(oid) {
          var id = String(oid || "").trim();
          if (!id) {
            return "<td></td>";
          }
          var url = lmsOfferingSearchUrl(id);
          return (
            '<td><a class="oid-link" href="' +
            escapeHtml(url) +
            '" target="_blank" rel="noopener noreferrer" title="Red Hat LMS でこの Offering ID を検索">' +
            escapeHtml(id) +
            "</a></td>"
          );
        }

        function attrEncode(s) {
          return encodeURIComponent(String(s));
        }

        function attrDecode(s) {
          try {
            return decodeURIComponent(String(s));
          } catch (e) {
            return "";
          }
        }

        function setFilterLabel(label) {
          state.filterLabel = label || null;
          renderTables();
          renderLegendChips();
          renderFilterBar();
        }

        function renderFilterBar() {
          var bar = document.getElementById("filter-bar");
          if (!state.filterLabel) {
            bar.hidden = true;
            bar.innerHTML = "";
            return;
          }
          bar.hidden = false;
          bar.innerHTML =
            "表示中: <strong>" +
            escapeHtml(state.filterLabel) +
            '</strong> <button type="button" class="clear-btn" data-clear-filter="1">すべて表示</button>';
        }

        function renderMonthNav() {
          var nav = document.getElementById("month-nav");
          var keys = [];
          var seen = {};
          for (var i = 0; i < state.data.length; i++) {
            var mk = monthKeyForItem(state.data[i]) || "unknown";
            if (!seen[mk]) {
              seen[mk] = true;
              keys.push(mk);
            }
          }
          keys.sort();
          if (keys.length <= 1) {
            nav.hidden = true;
            nav.innerHTML = "";
            return;
          }
          nav.hidden = false;
          var html =
            '<span class="label">表示月:</span>' +
            '<button type="button" class="nav-month' +
            (state.selectedMonthKey == null ? " is-active" : "") +
            '" data-month-all="1">すべて</button>';
          for (var j = 0; j < keys.length; j++) {
            var key = keys[j];
            var act = state.selectedMonthKey === key ? " is-active" : "";
            html +=
              '<button type="button" class="nav-month' +
              act +
              '" data-month-key="' +
              escapeHtml(key) +
              '">' +
              escapeHtml(monthLabel(key)) +
              "</button>";
          }
          nav.innerHTML = html;
        }

        function renderLegendChips() {
          var legendEl = document.getElementById("legend");
          legendEl.hidden = false;
          legendEl.innerHTML =
            '<strong style="color:#94a3b8;font-size:.8rem">Class Status（クリックで絞り込み）:</strong> ' +
            state.seenStatus
              .map(function (st) {
                var slug = knownStatusRowAttr(statusSlug(st));
                var active =
                  state.filterLabel != null && state.filterLabel === st
                    ? " is-active"
                    : "";
                return (
                  '<button type="button" class="badge chip' +
                  active +
                  '" data-slug="' +
                  slug +
                  '" data-st="' +
                  attrEncode(st) +
                  '">' +
                  escapeHtml(st) +
                  "</button>"
                );
              })
              .join(" ");
        }

        function renderTables() {
          var data = state.data;
          if (state.selectedMonthKey != null) {
            data = data.filter(function (it) {
              var mk = monthKeyForItem(it) || "unknown";
              return mk === state.selectedMonthKey;
            });
          }
          if (state.filterLabel != null) {
            data = data.filter(function (it) {
              return it.status === state.filterLabel;
            });
          }

          var byMonth = {};
          for (var d = 0; d < data.length; d++) {
            var item = data[d];
            var mk = monthKeyForItem(item) || "unknown";
            if (!byMonth[mk]) {
              byMonth[mk] = [];
            }
            byMonth[mk].push(item);
          }
          var monthKeys = Object.keys(byMonth).sort();

          if (monthKeys.length === 0) {
            document.getElementById("app").innerHTML =
              '<p class="empty-filter">該当する行がありません。</p>';
            return;
          }

          var html = "";
          for (var m = 0; m < monthKeys.length; m++) {
            var key = monthKeys[m];
            var list = byMonth[key];
            html += '<section class="month-block"><h2>' + escapeHtml(monthLabel(key)) + "</h2>";
            html += '<div class="wrap"><table><thead><tr>';
            html +=
              "<th>期間（ローカル表記）</th><th>SKU</th><th>Offering</th><th>Class Status</th><th>Offering ID</th>";
            html += "</tr></thead><tbody>";
            for (var k = 0; k < list.length; k++) {
              var it = list[k];
              var slug = knownStatusRowAttr(statusSlug(it.status));
              var chipActive =
                state.filterLabel != null && state.filterLabel === it.status
                  ? " is-active"
                  : "";
              html += '<tr data-status="' + slug + '">';
              html += "<td class=period>" + escapeHtml(it.start || "");
              html += " <small>" + escapeHtml(it.startT || "") + "</small>";
              html += "<br>〜 " + escapeHtml(it.end || "");
              html += " <small>" + escapeHtml(it.endT || "") + "</small></td>";
              html += "<td>" + escapeHtml(it.sku || "") + "</td>";
              html += '<td class="name">' + escapeHtml(it.name || "") + "</td>";
              html +=
                '<td><button type="button" class="badge chip' +
                chipActive +
                '" data-slug="' +
                slug +
                '" data-st="' +
                attrEncode(it.status || "") +
                '">' +
                escapeHtml(it.status || "") +
                "</button></td>";
              html += offeringIdTdHtml(it.oid);
              html += "</tr>";
            }
            html += "</tbody></table></div></section>";
          }

          document.getElementById("app").innerHTML = html;
        }

        function ingestRows(rows) {
          if (rows.length < 2) {
            document.getElementById("app").innerHTML =
              '<p class="err">データがありません。</p>';
            return;
          }
          var header = rows[0];
          var iStart = headerIndex(header, "Start Date");
          var iStartT = headerIndex(header, "Start Time");
          var iEnd = headerIndex(header, "End Date");
          var iEndT = headerIndex(header, "End Time");
          var iSku = headerIndex(header, "SKU");
          var iName = headerIndex(header, "Offering Name");
          var iOid = headerIndex(header, "Offering ID");
          var iStat = headerIndex(header, "Class Status");

          var data = [];
          for (var r = 1; r < rows.length; r++) {
            var row = rows[r];
            if (!row.length || (row.length === 1 && row[0] === "")) {
              continue;
            }
            var st = row[iStat] != null ? String(row[iStat]).trim() : "";
            data.push({
              start: row[iStart],
              startT: row[iStartT],
              end: row[iEnd],
              endT: row[iEndT],
              sku: row[iSku],
              name: row[iName],
              oid: row[iOid],
              status: st,
            });
          }

          data.sort(function (a, b) {
            return String(a.start).localeCompare(String(b.start));
          });

          data = data.filter(isNotPastRow);

          if (data.length === 0) {
            state.data = [];
            state.seenStatus = [];
            state.filterLabel = null;
            state.selectedMonthKey = null;
            document.getElementById("month-nav").hidden = true;
            document.getElementById("month-nav").innerHTML = "";
            document.getElementById("legend").hidden = true;
            document.getElementById("filter-bar").hidden = true;
            document.getElementById("app").innerHTML =
              '<p class="empty-filter">本日以降に終了予定のクラスがありません（掲載はすべて過去の終了済みです）。</p>';
            return;
          }

          var seenStatus = [];
          var statusSet = {};
          for (var u = 0; u < data.length; u++) {
            var st2 = data[u].status;
            if (st2 && !statusSet[st2]) {
              statusSet[st2] = true;
              seenStatus.push(st2);
            }
          }

          var monthSet = {};
          for (var v = 0; v < data.length; v++) {
            monthSet[monthKeyForItem(data[v]) || "unknown"] = true;
          }
          if (state.selectedMonthKey && !monthSet[state.selectedMonthKey]) {
            state.selectedMonthKey = null;
          }

          state.data = data;
          state.seenStatus = seenStatus;
          state.filterLabel = null;
          renderMonthNav();
          renderLegendChips();
          renderFilterBar();
          renderTables();
        }

        document.addEventListener("click", function (e) {
          var monthBtn = e.target.closest("[data-month-key], [data-month-all]");
          if (monthBtn) {
            e.preventDefault();
            if (monthBtn.hasAttribute("data-month-all")) {
              state.selectedMonthKey = null;
            } else {
              state.selectedMonthKey = monthBtn.getAttribute("data-month-key");
            }
            renderMonthNav();
            renderTables();
            return;
          }
          if (e.target.closest("[data-clear-filter]")) {
            e.preventDefault();
            setFilterLabel(null);
            return;
          }
          var chip = e.target.closest("[data-st]");
          if (!chip || !chip.hasAttribute("data-st")) {
            return;
          }
          e.preventDefault();
          var label = attrDecode(chip.getAttribute("data-st"));
          if (state.filterLabel === label) {
            setFilterLabel(null);
          } else {
            setFilterLabel(label);
          }
        });

        fetch(CSV_URL)
          .then(function (res) {
            if (!res.ok) {
              throw new Error(res.status + " " + res.statusText);
            }
            return res.text();
          })
          .then(function (text) {
            ingestRows(parseCSV(text));
          })
          .catch(function (e) {
            document.getElementById("app").innerHTML =
              '<p class="err">読み込み失敗: ' + escapeHtml(e.message) + "</p>";
          });
      })();
    </script>
  </body>
</html>
